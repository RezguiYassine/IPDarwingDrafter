# ─────────────────────────────────────────────────────────────────────────────
# IP DrawingDrafter — Vectorization Pipeline Configuration
# Single source of truth for all four stages.
#
# All paths are RELATIVE to the project root. Run scripts from the project
# root (e.g.  python stage1_preprocessing/stage1_preprocess.py ...) so the
# relative paths resolve correctly.
# ─────────────────────────────────────────────────────────────────────────────

# ── SketchCleanNet (Stage 1) ─────────────────────────────────────────────────
sketchcleannet:
  # Path to pretrained weights (.pth file).
  # Not shipped in the repo (>100 MB). Run setup.sh to download, or set the
  # path manually. Leave empty ("") to use the classical cleaning fallback.
  weights: "models/sketchcleannet.pth"
  device:  "cpu"          # "cuda" or "cpu"

# ── Puhachov stroke-extraction CNN (Stage 2) ─────────────────────────────────
puhachov:
  # The shipped/local checkpoint is not compatible with the local detector
  # wrapper, so production uses the CN fallback until a matching checkpoint is
  # ported or retrained. The loader now refuses incompatible weights instead of
  # silently running random parameters.
  weights: ""
  device:  "cpu"
  keypoint_threshold: 0.50
  nms_radius:          5

# ── Free2CAD primitive-fitting Transformer (Stage 3 — RESEARCH ONLY) ─────────
# The production Stage 3 uses RANSAC and does NOT load these weights.
# This config block is consumed only by stage3_primitivesfitting/research/
# (training + Free2CAD-based inference). See docs/archive/free2cad_handoff.md.
free2cad:
  weights:   "models/free2cad_v3_best.pth"
  device:    "cuda"
  repo_path: "stage3_primitivesfitting/research/repos/Free2CAD/networkTraining"

# ── Stage 0 — Patent reference handling ──────────────────────────────────────
stage0:
  enabled: true                 # PatentData: remove reference numerals/leaders
                                 # before skeletonisation, then reinject them
                                 # during export as annotations.
  max_iterations: 10             # Multiple bounded passes catch references that
                                 # become detectable only after earlier removals.
  require_leader: true           # Only remove small text clusters linked to a
                                 # nearby leader/help line, plus strict
                                 # unleadered text clusters below.
  remove_unleadered_labels: true
  unleadered_min_components: 1    # Single-component labels are removed only in
                                 # margin bands with density limits below.
  unleadered_max_components: 6
  unleadered_max_bbox_area: 6500
  unleadered_max_ink_area: 2200
  unleadered_allow_single_component: true
  unleadered_single_margin_ratio: 0.24
  unleadered_single_min_density: 0.18
  unleadered_single_max_bbox_area: 3000
  unleadered_single_max_ink_area: 1400
  remove_figure_labels: true     # Remove compact FIG/Figure labels at page/panel
                                 # margins with a separate large-text detector.
  figure_cluster_max_components: 12
  figure_cluster_max_bbox_area: 32000
  figure_cluster_max_ink_area: 18000
  figure_require_margin: false   # Panel captions can sit between subfigures,
                                 # not only at the page edge.
  figure_margin_ratio: 0.22
  max_reference_labels: 220      # Dense text/formula pages should trip the guard
                                 # instead of being aggressively erased.
  max_removed_ink_ratio: 0.70    # Filtered PatentData can be reference-heavy;
                                 # still guard formula/text pages and bad masks.
  max_total_removed_ink_ratio: 0.82
  text_only_on_guard: true       # If full leader removal is too destructive,
                                 # remove only detected labels and flag the JSON.
  max_guard_text_only_removed_ink_ratio: 0.20
  max_guard_text_only_labels: 240
  text_bbox_pad: 3
  crop_pad: 2
  leader_endpoint_margin: 18
  leader_segment_margin: 12
  leader_mask_thickness: 5
  leader_tip_trim: 8
  leader_min_support_ratio: 0.50
  leader_support_radius: 1
  repair_after_removal: true
  repair_close_kernel: 7
  hough_min_line_length: 35
  hough_threshold: 24
  hough_max_line_gap: 6
  leader_max_length: 450
  leader_max_length_ratio: 0.28
  max_leaders_per_label: 2

# ── Stage 1 — Preprocessing ───────────────────────────────────────────────────
stage1:
  # Skeleton quality threshold [0.0 – 1.0].
  # Sketches whose quality score falls below this are flagged for manual review.
  quality_threshold: 0.70

  # Classical cleaning parameters (used when SketchCleanNet weights unavailable)
  classical:
    blur_kernel:    3       # Gaussian blur kernel size (odd int, 1 = off)
    adaptive_block: 35      # Adaptive threshold block size (odd int, >= 3)
    adaptive_C:     10      # Adaptive threshold constant C
    blend_alpha:    0.6     # Otsu weight in Otsu+Adaptive blend [0.0 – 1.0]
    morph_kernel:   2       # Morphological opening kernel size (pixels)
    min_cc_size:    30      # Minimum connected component area to keep (pixels)

# ── Stage 2 — Stroke Extraction ───────────────────────────────────────────────
stage2:
  isolation_threshold: 0.30   # Flag if >30% of foreground pixels are orphaned.
                               # Original 0.05 was calibrated for clean SVG inputs.
                               # Patent TIFs have scan noise that produces 10–20%
                               # orphaned pixels even on valid drawings (p75=0.16,
                               # p90=0.24 on a 999-sketch sample). 0.30 flags only
                               # the top ~5% of sketches — genuinely noisy scans.
  spline_overshoot_limit: 5.0 # Max px a B-spline may exceed the raw pixel bbox.
                               # scipy splprep can oscillate by tens of pixels on
                               # long near-straight edges (end-effect / Runge
                               # phenomenon). Exceeding this limit causes the
                               # spline to be discarded in favour of RDP points.
  min_closed_loop_pixels: 80  # Closed-loop edges shorter than this (in skeleton
                               # pixels) are treated as noise (ink blobs, dust)
                               # and removed before Stage 3. Prevents tiny loops
                               # from being fitted as spurious small circles.
  nms_reference_resolution: 512  # Resolution the Puhachov model was tuned for.
                                  # NMS radius is scaled as:
                                  #   effective = nms_radius × max(H,W) / this value
                                  # so junction suppression stays proportional on
                                  # large patent TIFs (1400–2700 px). Set to 0 to
                                  # use the raw nms_radius from the puhachov block.
  max_input_resolution: 1000     # Skeleton images larger than this (long edge, px)
                                  # are downsampled before Stage 2.  Prevents the
                                  # Puhachov CNN from over-segmenting large patent
                                  # TIFs (2000–2700 px → 10 k–300 k edges).
                                  # 1-px skeleton lines are dilated before resize so
                                  # they survive downsampling without topological
                                  # breaks.  Set to 0 to disable the cap.

  # ── Graph simplification (de-fragmentation) ──────────────────────────────
  # The CN map splits a single logical stroke wherever a phantom CN>=3 pixel
  # appears (Zhang-Suen staircase) or wherever a stroke crosses a junction.
  # Without cleanup a long line fragments into many primitives — dense patent
  # scans yield thousands of 2–3 px junction stubs. This pass prunes spurs,
  # dissolves degree-2 phantom junctions, and merges collinear edges that pass
  # straight through real junctions.  D2C 300-sample eval: primitives mean
  # 5.06 → 2.73 (−46 %), IoU/Chamfer unchanged.
  simplify_graph: true
  spur_min_length: 6.0            # Dead-end edges shorter than this (px arc-length)
                                  # that dangle off a junction are pruned as
                                  # skeleton barbs / scan whiskers.
  merge_collinear_max_angle: 28.0 # Two edges meeting at a junction are merged into
                                  # one stroke if they continue straight through it
                                  # within this many degrees of 180°.
  junction_merge_radius: 0.0      # Collapse junction clusters within this radius
                                  # (px). OFF by default: it welds parallel strokes
                                  # that run close together (concentric circles,
                                  # washers, thin-ring/double-wall outlines),
                                  # destroying them. Only enable (e.g. 3–4) on
                                  # corpora free of close parallel lines.
  remove_hachures: true           # Patent section hatching creates dense parallel
                                  # short strokes that split true outlines at every
                                  # contact. Remove hatch-like edge clusters in
                                  # Stage 2, store them in graph.removed_hachures,
                                  # and ignore their pixels in isolation scoring.
  hachure_pre_pass: false          # Pre-simplify removal can mistake true boundary
                                  # fragments for hatches; preserve outlines first.
  hachure_second_pass: true        # Run after simplification, when true outlines
                                  # have already been reconnected as much as
                                  # possible.
  hachure_trigger_min_open_edges: 40
  hachure_trigger_micro_edge_ratio: 0.20
  hachure_trigger_short_edge_ratio: 0.80
  hachure_min_graph_edges: 20
  hachure_min_length: 5.0
  hachure_max_length: 80.0
  hachure_min_straightness: 0.70
  hachure_max_residual_rms: 2.2
  hachure_angle_tolerance: 12.0
  hachure_cluster_radius: 95.0
  hachure_min_cluster_edges: 4
  hachure_min_cluster_total_length: 35.0
  hachure_max_removed_edge_ratio: 0.75
  hachure_residual_prune_max_length: 6.0
  hachure_residual_prune_min_removed: 4
  fragmentation:
    max_edges: 2500
    max_micro_edge_ratio: 0.50
    max_short_edge_ratio: 0.80

# ── Stage 3 — Primitive Fitting ───────────────────────────────────────────────
stage3:
  confidence_threshold: 0.60  # Primitive confidence below this = flag
  min_hachure_edges_for_relaxed_confidence: 20
  confidence_threshold_after_hachure: 0.50
                              # Main-geometry confidence is not directly
                              # comparable after hatch extraction: the easy
                              # hatch-line primitives are now a side layer.
                              # Relax only for hachure-heavy graphs.

# ── Datasets (Free2CAD training pipeline — research only, not shipped) ───────
# These directories are gitignored. Populate them with setup.sh / your own
# generator before training. See docs/archive/free2cad_handoff.md.
data:
  training_dir: "stage3_primitivesfitting/research/data/free2cad_training"
  abc_step_dir: "stage3_primitivesfitting/research/data/abc_dataset/step_files"
  deepcad_dir:  "stage3_primitivesfitting/research/data/deepcad"
  weights_dir:  "models"

# ── Free2CAD training defaults (research only) ───────────────────────────────
training:
  epochs:      100
  batch_size:  32
  lr:          0.0001
  max_strokes: 20
  max_pts:     32
  n_samples:   30000
  noise_std:   0.005
  splits:      "0.85,0.10,0.05"

# ── Global pipeline settings ──────────────────────────────────────────────────
pipeline:
  workers:    4            # Parallel workers (0/1 = no parallelism)
  resume:     true         # Skip sketches that already have complete outputs
  log_level: "INFO"        # DEBUG | INFO | WARNING | ERROR
  quality_gates:
    enabled: true           # PatentData batch mode: stop before exporting bad CAD
    stop_on_stage1: true    # Reject low-quality / halftone / text-like skeletons
    stop_on_stage2: true    # Reject heavily fragmented or isolated graphs
    max_primitives: 900     # Hard cap for usable CAD output
    max_low_conf_ratio: 0.25 # Reject exports with too many uncertain primitives
    min_hachure_edges_for_low_conf_relax: 20
                              # Removing hatch lines lowers the primitive
                              # denominator; use the relaxed ratio below only
                              # when Stage 2 actually removed many hachure
                              # strokes.
    max_low_conf_ratio_after_hachure: 0.65
